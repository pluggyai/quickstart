name: vercel-node-mongo CI

on:
  push:
    branches: [master]
    paths:
      - examples/vercel-node-mongo/**
      - .github/workflows/vercel-mongo-ci.yml
  pull_request:
    paths:
      - examples/vercel-node-mongo/**
      - .github/workflows/vercel-mongo-ci.yml

concurrency:
  group: vercel-mongo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: install / lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/vercel-node-mongo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: examples/vercel-node-mongo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
